services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lle
      POSTGRES_PASSWORD: lle
      POSTGRES_DB: little_library_exchange
    volumes:
      - lle_pgdata:/var/lib/postgresql/data
      - ./scripts/docker-init-databases.sql:/docker-entrypoint-initdb.d/01-create-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lle -d little_library_exchange"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  lle_pgdata:
